<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>期货信号监控</title>
<link rel="stylesheet" href="/static/dashboard.css">
</head>
<body>

<div class="app" x-data>

  <!-- ========== 顶部状态栏 ========== -->
  <header class="header">
    <h1>期货信号监控</h1>
    <span class="stat">
      <span class="status-dot"
            :class="$store.dash.engineStatus === 'running' ? 'on' :
                   ($store.dash.engineStatus === 'reconnecting' ? 'warn' : 'off')"></span>
      <b x-text="$store.dash.engineStatus || '未知'"></b>
    </span>
    <span class="stat">SSE:
      <b x-text="$store.dash.connected ? '已连接' : '断开'"
         :class="$store.dash.connected ? 'pos' : 'neg'"></b>
    </span>
    <span class="stat">持仓 <b x-text="$store.dash.openPositionCount"></b></span>
    <span class="stat">候选 <b x-text="$store.dash.candidateCount"></b></span>
    <span class="stat">拒绝(近) <b x-text="$store.dash.rejectStream.length"></b></span>
    <span class="spacer"></span>
    <span class="stat muted" x-text="'上次刷新 ' + fmt.time($store.dash.lastUpdate)"></span>
    <a href="/legacy" class="stat muted" style="text-decoration:underline;font-size:11px">legacy</a>
  </header>

  <!-- ========== 三栏 + 底部抽屉 ========== -->
  <div class="main">

    <!-- =========== 左栏：规则树 =========== -->
    <aside class="col col-left">

      <div class="section">
        <div class="section-title">
          <span>规则</span>
          <span class="count" x-text="$store.dash.rulesCatalog
              ? Object.keys($store.dash.rulesCatalog.rules || {}).length + ' 条'
              : '--'"></span>
        </div>

        <template x-if="!$store.dash.rulesCatalog">
          <div class="empty">加载规则目录...</div>
        </template>

        <template x-if="$store.dash.rulesCatalog">
          <div class="rule-tree">
            <template x-for="(meta, rk) in $store.dash.rulesCatalog.rules" :key="rk">
              <div class="rule-item"
                   :class="$store.dash.selectedRule === rk ? 'active' : ''"
                   @click="$store.dash.selectedRule = ($store.dash.selectedRule === rk ? null : rk)">
                <div class="rule-top">
                  <span class="rule-label" x-text="meta.label || rk"></span>
                  <template x-if="$store.dash.driftState[rk]">
                    <span class="rule-badge"
                          :class="$store.dash.driftState[rk].severity"
                          x-text="$store.dash.driftState[rk].severity || ''"></span>
                  </template>
                </div>
                <div class="rule-count">
                  <template x-if="$store.dash.ruleTodayCounters[rk]">
                    <span>
                      <span>今 <b x-text="($store.dash.ruleTodayCounters[rk].hits||0)"></b></span>
                      <span class="win">胜 <b x-text="($store.dash.ruleTodayCounters[rk].wins||0)"></b></span>
                      <span class="lose">负 <b x-text="($store.dash.ruleTodayCounters[rk].losses||0)"></b></span>
                    </span>
                  </template>
                  <template x-if="!$store.dash.ruleTodayCounters[rk]">
                    <span class="muted">今日 0</span>
                  </template>
                </div>
              </div>
            </template>
          </div>
        </template>
      </div>

    </aside>

    <!-- =========== 中栏：候选池 + 合约查询 + 持仓 =========== -->
    <main class="col col-mid">

      <!-- 合约查询（先放最顶，方便输入） -->
      <div class="section">
        <div class="section-title">合约查询</div>
        <div class="search-bar"
             x-data="{ code: '' }">
          <input type="text" placeholder="rb2510 / SHFE.rb / rb2510-C-3500  (按 / 聚焦)"
                 data-role="inspect"
                 x-model="code"
                 @keyup.enter="dashApi.inspect(code)">
          <button @click="dashApi.inspect(code)">查询</button>
          <button @click="dashApi.clearInspect(); code=''"
                  style="background:var(--bg3)">清除</button>
        </div>

        <template x-if="$store.dash.selectedContract && $store.dash.selectedContract.error">
          <div class="empty" x-text="'查询失败: ' + $store.dash.selectedContract.error"></div>
        </template>

        <template x-if="$store.dash.selectedContract && !$store.dash.selectedContract.error">
          <div class="inspect">
            <div class="inspect-head">
              <span class="name"
                    x-text="($store.dash.selectedContract.sym_name || '')
                         + ' ' + ($store.dash.selectedContract.code || '')"></span>
              <span class="price"
                    x-text="fmt.num($store.dash.selectedContract.last_price, 2)"></span>
            </div>
            <template x-if="$store.dash.selectedContract.panel">
              <div class="kv-grid">
                <div class="kv"><span class="k">EMA10</span>
                  <span class="v" x-text="fmt.num($store.dash.selectedContract.panel.ema10)"></span></div>
                <div class="kv"><span class="k">EMA20</span>
                  <span class="v" x-text="fmt.num($store.dash.selectedContract.panel.ema20)"></span></div>
                <div class="kv"><span class="k">EMA120</span>
                  <span class="v" x-text="fmt.num($store.dash.selectedContract.panel.ema120)"></span></div>
                <div class="kv"><span class="k">ATR</span>
                  <span class="v" x-text="fmt.num($store.dash.selectedContract.panel.atr)"></span></div>
                <div class="kv"><span class="k">ER20</span>
                  <span class="v"
                        :class="($store.dash.selectedContract.panel.er20||0) >= 0.5 ? 'pos' : ''"
                        x-text="fmt.num($store.dash.selectedContract.panel.er20)"></span></div>
                <div class="kv"><span class="k">偏离ATR</span>
                  <span class="v"
                        x-text="fmt.num($store.dash.selectedContract.panel.deviation_atr)"></span></div>
                <div class="kv"><span class="k">趋势</span>
                  <span class="v"
                        :class="$store.dash.selectedContract.panel.trend_dir === 1 ? 'pos' :
                               ($store.dash.selectedContract.panel.trend_dir === -1 ? 'neg' : '')"
                        x-text="$store.dash.selectedContract.panel.trend_dir === 1 ? '多' :
                               ($store.dash.selectedContract.panel.trend_dir === -1 ? '空' : '平')"></span></div>
                <div class="kv"><span class="k">回调</span>
                  <span class="v"
                        x-text="($store.dash.selectedContract.current_state?.pullback_stage || '--')
                              + ' × '
                              + ($store.dash.selectedContract.current_state?.pullback_bar_count ?? 0)"></span></div>
              </div>
            </template>
          </div>
        </template>
      </div>

      <!-- 候选池 -->
      <div class="section">
        <div class="section-title">
          <span>候选信号池</span>
          <span class="count" x-text="$store.dash.candidates.length + ' 个'"></span>
        </div>

        <template x-if="$store.dash.candidates.length === 0">
          <div class="empty">当前无候选信号</div>
        </template>

        <div class="candidate-list">
          <template x-for="c in $store.dash.candidates" :key="c.sym_key + '_' + c.kind">
            <div class="cand"
                 :class="fmt.distClass(c.distance_ticks)"
                 @click="dashApi.inspect(c.sym_key)">
              <div class="cand-head">
                <span class="cand-name">
                  <span class="cand-tag"
                        :class="c.kind && c.kind.startsWith('type1') ? 'kind-T1' :
                               (c.kind && c.kind.startsWith('BC') ? 'kind-BC' : 'kind-A')"
                        x-text="c.kind"></span>
                  <span x-text="c.sym_name || c.sym_key"></span>
                  <span :class="c.direction_bias === 'long' ? 'bias-long' :
                               (c.direction_bias === 'short' ? 'bias-short' : 'muted')"
                        x-text="c.direction_bias === 'long' ? '↑多' :
                               (c.direction_bias === 'short' ? '↓空' : '')"></span>
                </span>
                <span class="cand-dist">
                  距触发 <b x-text="c.distance_ticks ?? '--'"></b> tick
                </span>
              </div>
              <div class="cand-body">
                <span>现价 <span class="strong" x-text="fmt.num(c.current_price)"></span></span>
                <span>触发 <span class="strong" x-text="fmt.num(c.trigger_price)"></span></span>
                <span>ER20 <span class="strong" x-text="fmt.num(c.er20)"></span></span>
                <span>偏离 <span class="strong" x-text="fmt.num(c.deviation_atr)"></span>ATR</span>
              </div>
            </div>
          </template>
        </div>
      </div>

      <!-- 持仓 -->
      <div class="section">
        <div class="section-title">
          <span>活跃持仓</span>
          <span class="count" x-text="$store.dash.openPositionCount + ' 笔'"></span>
        </div>

        <template x-if="$store.dash.openPositionCount === 0">
          <div class="empty">暂无活跃持仓</div>
        </template>

        <template x-for="p in $store.dash.openPositions" :key="p.signal_id || p.sym_key">
          <div class="pos-row">
            <div class="pos-head">
              <span class="pos-name">
                <span x-text="p.sym_name || p.sym_key"></span>
                <span :class="'dir-' + p.direction"
                      x-text="p.direction === 'long' ? '多' : '空'"></span>
              </span>
              <span class="pos-r"
                    :class="(($store.dash.portfolioLive[p.signal_id]?.current_r ?? 0) >= 0)
                           ? 'pos' : 'neg'"
                    x-text="fmt.r($store.dash.portfolioLive[p.signal_id]?.current_r)"></span>
            </div>
            <div class="pos-body">
              <span>入场 <span class="strong" x-text="fmt.num(p.entry_price)"></span></span>
              <span>止损 <span class="strong"
                    x-text="fmt.num($store.dash.portfolioLive[p.signal_id]?.current_stop
                                  ?? p.current_stop ?? p.initial_stop)"></span></span>
              <span>策略 <span class="strong" x-text="p.exit_strategy || '--'"></span></span>
              <span>持根 <span class="strong"
                    x-text="$store.dash.portfolioLive[p.signal_id]?.bars_held ?? p.bars_held ?? 0"></span></span>
              <span>MFE <span class="strong"
                    x-text="fmt.r($store.dash.portfolioLive[p.signal_id]?.mfe_r)"></span></span>
              <span>MAE <span class="strong"
                    x-text="fmt.r($store.dash.portfolioLive[p.signal_id]?.mae_r)"></span></span>
            </div>
          </div>
        </template>
      </div>

    </main>

    <!-- =========== 右栏：信号流水 + 拒绝流水 =========== -->
    <aside class="col col-right" x-data="{ tab: 'rejects' }">

      <div class="section">
        <div class="section-title">
          <span>事件流水</span>
        </div>
        <div class="tabs">
          <span class="tab" :class="tab==='rejects' ? 'active' : ''"
                @click="tab='rejects'">拒绝 <span x-text="$store.dash.rejectStream.length"></span></span>
          <span class="tab" :class="tab==='sector' ? 'active' : ''"
                @click="tab='sector'">板块</span>
        </div>

        <template x-if="tab==='rejects'">
          <div class="feed">
            <template x-if="$store.dash.rejectStream.length === 0">
              <div class="empty">暂无拒绝</div>
            </template>
            <template x-for="(r, idx) in $store.dash.rejectStream.slice(0, 50)"
                      :key="(r.time||idx) + '_' + idx">
              <div class="feed-item"
                   :class="r.stage === 'near_miss' ? 'near-miss' :
                          (r.stage === 'global_filter' ? 'reject-global' : '')">
                <span class="time" x-text="fmt.time(r.time)"></span>
                <span class="sym" x-text="r.sym_key || '--'"></span>
                <span class="tag" x-text="r.stage || ''"></span>
                <span class="reason" x-text="r.reason"></span>
              </div>
            </template>
          </div>
        </template>

        <template x-if="tab==='sector'">
          <div class="feed">
            <template x-if="Object.keys($store.dash.sectorExposure).length === 0">
              <div class="empty">暂无板块数据</div>
            </template>
            <template x-for="(slot, sec) in $store.dash.sectorExposure" :key="sec">
              <div class="feed-item">
                <span class="sym" x-text="sec"></span>
                <span class="tag" x-show="slot.long_count > 0"
                      x-text="'多 ' + slot.long_count"></span>
                <span class="tag" x-show="slot.short_count > 0"
                      x-text="'空 ' + slot.short_count"></span>
                <span class="muted" style="margin-left:6px" x-text="
                  (slot.long_symbols || []).join(',') + ' / ' +
                  (slot.short_symbols || []).join(',')"></span>
              </div>
            </template>
          </div>
        </template>
      </div>

    </aside>

  </div>

  <!-- ========== 底部抽屉（C4-C5） ========== -->
  <div class="drawer"
       :class="$store.dash.drawerOpen ? 'open' : 'closed'">

    <div class="drawer-tabs">
      <button class="drawer-tab"
              :class="$store.dash.drawerTab==='heatmap' && $store.dash.drawerOpen ? 'active':''"
              @click="$store.dash.drawerOpen=true; $store.dash.drawerTab='heatmap'">
        市场热力图 <span class="muted"
          x-text="'(' + Object.keys($store.dash.symbolHeatmap).length + ')'"></span>
      </button>
      <button class="drawer-tab"
              :class="$store.dash.drawerTab==='sector' && $store.dash.drawerOpen ? 'active':''"
              @click="$store.dash.drawerOpen=true; $store.dash.drawerTab='sector'">
        板块暴露
        <span x-show="$store.dash.sectorWarnings.length > 0"
              class="tag bad" style="margin-left:4px"
              x-text="'!' + $store.dash.sectorWarnings.length"></span>
      </button>
      <button class="drawer-tab"
              :class="$store.dash.drawerTab==='rejects_agg' && $store.dash.drawerOpen ? 'active':''"
              @click="$store.dash.drawerOpen=true; $store.dash.drawerTab='rejects_agg'">
        拒绝聚合 <span class="muted"
          x-text="'(' + $store.dash.rejectAggregate.length + ')'"></span>
      </button>
      <button class="drawer-tab"
              :class="$store.dash.drawerTab==='rules_doc' && $store.dash.drawerOpen ? 'active':''"
              @click="$store.dash.drawerOpen=true; $store.dash.drawerTab='rules_doc'">
        规则手册
      </button>

      <button class="drawer-toggle"
              @click="$store.dash.drawerOpen = !$store.dash.drawerOpen"
              x-text="$store.dash.drawerOpen ? '收起 ▾' : '展开 ▴'"></button>
    </div>

    <div class="drawer-body" x-show="$store.dash.drawerOpen">

      <!-- 热力图 -->
      <template x-if="$store.dash.drawerTab === 'heatmap'">
        <div>
          <template x-if="Object.keys($store.dash.symbolHeatmap).length === 0">
            <div class="empty">暂无热力图数据（引擎启动后每 bar 刷新）</div>
          </template>
          <template x-for="(cells, sec) in $store.dash.heatmapBySector" :key="sec">
            <div class="heat-group">
              <div class="heat-group-title" x-text="sec + ' · ' + cells.length + ' 个'"></div>
              <div class="heat-grid">
                <template x-for="c in cells" :key="c.sym_key">
                  <div class="heat-cell"
                       :class="c.trend_dir === 1 ? 'long' :
                              (c.trend_dir === -1 ? 'short' : 'flat')"
                       @click="dashApi.inspect(c.sym_key)">
                    <div class="hc-badges">
                      <span x-show="c.has_position" class="hc-badge has-pos">持</span>
                      <span x-show="c.has_candidate" class="hc-badge has-cand">候</span>
                    </div>
                    <div class="hc-name" x-text="c.sym_name || c.sym_key"></div>
                    <div class="hc-metric">
                      <span>ER <b x-text="fmt.num(c.er20)"></b></span>
                      <span style="margin-left:6px">偏 <b x-text="fmt.num(c.deviation_atr, 1)"></b></span>
                    </div>
                    <div class="hc-metric">
                      <span>价 <b x-text="fmt.num(c.last_price)"></b></span>
                    </div>
                    <canvas width="120" height="20"
                            x-init="$nextTick(() => charts.heatCell($el.parentElement.querySelector('canvas'), c))"></canvas>
                  </div>
                </template>
              </div>
            </div>
          </template>
        </div>
      </template>

      <!-- 板块暴露 -->
      <template x-if="$store.dash.drawerTab === 'sector'">
        <div>
          <template x-if="Object.keys($store.dash.sectorExposure).length === 0">
            <div class="empty">暂无板块数据</div>
          </template>
          <div class="sector-grid">
            <template x-for="(slot, sec) in $store.dash.sectorExposure" :key="sec">
              <div class="sector-card"
                   :class="((slot.long_count+((slot.long_candidates||[]).length)) >= 3 ||
                           (slot.short_count+((slot.short_candidates||[]).length)) >= 3)
                           ? 'warn' : ''">
                <div class="sector-name" x-text="sec"></div>
                <div class="sector-line">
                  持仓 <b class="long" x-text="slot.long_count||0"></b>多 /
                  <b class="short" x-text="slot.short_count||0"></b>空
                </div>
                <div class="sector-line">
                  候选 <b class="long" x-text="(slot.long_candidates||[]).length"></b>多 /
                  <b class="short" x-text="(slot.short_candidates||[]).length"></b>空
                </div>
                <div class="sector-line muted" style="margin-top:4px"
                     x-text="([...(slot.long_symbols||[]), ...(slot.short_symbols||[]),
                              ...(slot.long_candidates||[]), ...(slot.short_candidates||[])]
                              .join(', ')) || '--'"></div>
              </div>
            </template>
          </div>
        </div>
      </template>

      <!-- 拒绝聚合 -->
      <template x-if="$store.dash.drawerTab === 'rejects_agg'">
        <div>
          <template x-if="$store.dash.rejectAggregate.length === 0">
            <div class="empty">暂无拒绝流水</div>
          </template>
          <div class="reject-agg">
            <template x-for="a in $store.dash.rejectAggregate" :key="a.reason">
              <div class="reject-agg-item">
                <span class="reject-agg-reason" x-text="a.reason"></span>
                <span class="reject-agg-count" x-text="a.count"></span>
              </div>
            </template>
          </div>
        </div>
      </template>

      <!-- 规则手册 -->
      <template x-if="$store.dash.drawerTab === 'rules_doc'">
        <div>
          <template x-if="!$store.dash.rulesCatalog">
            <div class="empty">加载中...</div>
          </template>
          <template x-if="$store.dash.rulesCatalog">
            <table class="rule-table">
              <thead>
                <tr>
                  <th>规则</th><th>族</th><th>说明</th><th>出场</th><th>条件</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="(meta, rk) in $store.dash.rulesCatalog.rules" :key="rk">
                  <tr>
                    <td><b x-text="meta.label || rk"></b>
                      <div class="muted" style="font-size:10px" x-text="rk"></div></td>
                    <td x-text="meta.family || '--'"></td>
                    <td x-text="meta.description || '--'"></td>
                    <td><code x-text="meta.exit_strategy || '--'"></code></td>
                    <td>
                      <template x-if="meta.conditions">
                        <div>
                          <template x-for="c in meta.conditions">
                            <div style="font-size:10px;color:var(--text2)">
                              <code x-text="c.key"></code>
                              <span x-text="c.op"></span>
                              <code x-text="JSON.stringify(c.value)"></code>
                            </div>
                          </template>
                        </div>
                      </template>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
          </template>
        </div>
      </template>

    </div>
  </div>

  <!-- ========== 快捷键帮助 (C8) ========== -->
  <template x-if="$store.dash.showShortcuts">
    <div>
      <div class="overlay" @click="$store.dash.showShortcuts = false"></div>
      <div class="shortcut-help">
        <h3>键盘快捷键</h3>
        <div class="row"><span>聚焦合约查询</span><kbd>/</kbd></div>
        <div class="row"><span>打开热力图</span><kbd>h</kbd></div>
        <div class="row"><span>打开板块暴露</span><kbd>s</kbd></div>
        <div class="row"><span>打开拒绝聚合</span><kbd>j</kbd></div>
        <div class="row"><span>打开规则手册</span><kbd>r</kbd></div>
        <div class="row"><span>折叠/展开抽屉</span><kbd>d</kbd></div>
        <div class="row"><span>显示本帮助</span><kbd>?</kbd></div>
        <div class="row"><span>关闭弹层</span><kbd>Esc</kbd></div>
      </div>
    </div>
  </template>

</div>

<script src="/static/alpine.min.js" defer></script>
<script src="/static/charts.js"></script>
<script src="/static/dashboard.js"></script>
</body>
</html>
